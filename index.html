<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp топқа қосылу</title>
    <meta name="description" content="WhatsApp тобына қосылу сілтемесі">
    
    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="WhatsApp топқа қосылу">
    <meta property="og:description" content="WhatsApp тобына қосылу үшін басыңыз">
    <meta property="og:type" content="website">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 30%, #25d366 70%, #dcf8c6 100%);
            padding: 20px;
            overflow: hidden;
        }

        /* Animated background bubbles */
        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.08);
            bottom: -160px;
            border-radius: 50%;
            animation: float-up 20s infinite;
        }

        .bg-bubbles li:nth-child(1)  { left: 10%;  width: 80px;  height: 80px;  animation-delay: 0s;    animation-duration: 18s; }
        .bg-bubbles li:nth-child(2)  { left: 20%;  width: 20px;  height: 20px;  animation-delay: 2s;    animation-duration: 22s; }
        .bg-bubbles li:nth-child(3)  { left: 25%;  width: 50px;  height: 50px;  animation-delay: 4s;    animation-duration: 16s; }
        .bg-bubbles li:nth-child(4)  { left: 40%;  width: 60px;  height: 60px;  animation-delay: 0s;    animation-duration: 20s; }
        .bg-bubbles li:nth-child(5)  { left: 65%;  width: 20px;  height: 20px;  animation-delay: 3s;    animation-duration: 14s; }
        .bg-bubbles li:nth-child(6)  { left: 75%;  width: 110px; height: 110px; animation-delay: 5s;    animation-duration: 24s; }
        .bg-bubbles li:nth-child(7)  { left: 85%;  width: 30px;  height: 30px;  animation-delay: 7s;    animation-duration: 19s; }
        .bg-bubbles li:nth-child(8)  { left: 50%;  width: 70px;  height: 70px;  animation-delay: 10s;   animation-duration: 21s; }
        .bg-bubbles li:nth-child(9)  { left: 5%;   width: 15px;  height: 15px;  animation-delay: 1s;    animation-duration: 25s; }
        .bg-bubbles li:nth-child(10) { left: 90%;  width: 90px;  height: 90px;  animation-delay: 8s;    animation-duration: 17s; }

        @keyframes float-up {
            0%   { bottom: -160px; transform: translateX(0) rotate(0deg); opacity: 0.4; }
            100% { bottom: 110%;   transform: translateX(-200px) rotate(720deg); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            animation: card-entrance 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes card-entrance {
            0%   { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .whatsapp-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.35);
            animation: icon-pulse 2s ease-in-out infinite;
        }

        @keyframes icon-pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(37, 211, 102, 0.35); }
            50%      { box-shadow: 0 8px 36px rgba(37, 211, 102, 0.55); }
        }

        .whatsapp-icon svg {
            width: 44px;
            height: 44px;
            fill: white;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Spinner */
        .spinner-container {
            margin-bottom: 24px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(37, 211, 102, 0.15);
            border-top-color: #25d366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 15px;
            color: #374151;
            font-weight: 500;
            margin-bottom: 20px;
            min-height: 24px;
            transition: opacity 0.3s ease;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(37, 211, 102, 0.12);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 28px;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #25d366, #128c7e);
            border-radius: 4px;
            animation: progress-fill 2s ease-in-out forwards;
        }

        @keyframes progress-fill {
            0%   { width: 0%; }
            30%  { width: 40%; }
            60%  { width: 70%; }
            90%  { width: 90%; }
            100% { width: 100%; }
        }

        /* Manual button (shown as fallback) */
        .btn-open {
            display: none;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 16px rgba(37, 211, 102, 0.3);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }

        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37, 211, 102, 0.45);
        }

        .btn-open:active {
            transform: translateY(0);
        }

        .btn-open.show {
            display: block;
            animation: btn-appear 0.4s ease;
        }

        @keyframes btn-appear {
            0%   { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Secondary open-browser button */
        .btn-browser {
            display: none;
            width: 100%;
            padding: 14px 24px;
            background: transparent;
            color: #128c7e;
            border: 2px solid #128c7e;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            font-family: 'Inter', sans-serif;
            margin-top: 12px;
        }

        .btn-browser:hover {
            background: rgba(18, 140, 126, 0.08);
        }

        .btn-browser.show {
            display: block;
            animation: btn-appear 0.4s ease 0.1s both;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: #9ca3af;
            line-height: 1.4;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Animated background -->
    <ul class="bg-bubbles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="card" id="card">
        <div class="whatsapp-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </div>

        <h1>WhatsApp топқа қосылу</h1>
        <p class="subtitle">Сілтеме автоматты түрде ашылуда...</p>

        <div class="spinner-container" id="spinnerContainer">
            <div class="spinner"></div>
        </div>

        <p class="status-text" id="statusText">Бағытталуда...</p>

        <div class="progress-bar" id="progressBar">
            <div class="fill"></div>
        </div>

        <a href="#" class="btn-open" id="btnOpen" onclick="openWhatsApp(); return false;">
            ✅ WhatsApp-ты ашу
        </a>

        <a href="#" class="btn-browser" id="btnBrowser" onclick="openInBrowser(); return false;">
            🌐 Браузерде ашу
        </a>

        <p class="footer-note" id="footerNote">
            Автоматты түрде ашылмаса, жоғарыдағы батырманы басыңыз
        </p>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const WHATSAPP_LINK = 'https://chat.whatsapp.com/KkrfMNiwKnN1MHt34gkqH0';

        // ===== DETECTION =====
        const ua = navigator.userAgent || navigator.vendor || window.opera || '';
        const uaLower = ua.toLowerCase();

        function isInAppBrowser() {
            const inAppPatterns = [
                'fbav', 'fban',                    // Facebook
                'fb_iab', 'fbios',                 // Facebook iOS
                'instagram',                        // Instagram
                'musical_ly', 'bytedance',         // TikTok
                'tiktok',                           // TikTok
                'twitter', 'twitterand',           // Twitter/X
                'snapchat',                         // Snapchat
                'line/',                            // LINE
                'wv)',                              // Android WebView
                'telegram',                         // Telegram
                'micromessenger',                   // WeChat
                'kakaotalk',                        // KakaoTalk
                'naver', 'whale',                  // Naver
                'threads',                          // Threads
                'linkedin',                         // LinkedIn
                'pinterest',                        // Pinterest
                'reddit',                           // Reddit
            ];
            return inAppPatterns.some(p => uaLower.includes(p));
        }

        function isAndroid()  { return /android/i.test(ua); }
        function isIOS()      { return /iphone|ipad|ipod/i.test(ua) && !window.MSStream; }
        function isSamsung()  { return /samsungbrowser/i.test(ua); }

        // ===== REDIRECT STRATEGIES =====
        const statusText = document.getElementById('statusText');
        const btnOpen    = document.getElementById('btnOpen');
        const btnBrowser = document.getElementById('btnBrowser');
        const spinner    = document.getElementById('spinnerContainer');

        function showButtons(msg) {
            statusText.textContent = msg || 'Батырманы басыңыз';
            spinner.classList.add('hidden');
            btnOpen.classList.add('show');
            btnBrowser.classList.add('show');
        }

        function openWhatsApp() {
            // Try intent first on Android, then fallback to direct link
            if (isAndroid()) {
                try {
                    window.location.href = 'intent://chat.whatsapp.com/KkrfMNiwKnN1MHt34gkqH0#Intent;scheme=https;package=com.whatsapp;end';
                    return;
                } catch(e) {}
            }
            window.location.href = WHATSAPP_LINK;
        }

        function openInBrowser() {
            // Force open in external browser
            if (isAndroid()) {
                // Android: intent to open in Chrome or default browser
                window.location.href = 'intent://' + WHATSAPP_LINK.replace('https://', '') + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
            } else if (isIOS()) {
                // iOS: try x-safari scheme
                window.location.href = 'x-safari-' + WHATSAPP_LINK;
            } else {
                window.open(WHATSAPP_LINK, '_system');
            }
            
            // Fallback after short delay
            setTimeout(function() {
                window.location.href = WHATSAPP_LINK;
            }, 500);
        }

        // ===== MAIN REDIRECT LOGIC =====
        function startRedirect() {
            const inApp = isInAppBrowser();

            if (inApp) {
                // === IN-APP BROWSER DETECTED ===
                statusText.textContent = 'Браузерге бағытталуда...';

                if (isAndroid()) {
                    // Strategy 1: Android Intent — open in default browser
                    try {
                        window.location.href = 'intent://' + WHATSAPP_LINK.replace('https://', '') + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
                    } catch(e) {}

                    // Strategy 2: Fallback — try Google Chrome directly
                    setTimeout(function() {
                        try {
                            window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(WHATSAPP_LINK);
                        } catch(e) {}
                    }, 800);

                    // Strategy 3: WhatsApp intent directly
                    setTimeout(function() {
                        try {
                            window.location.href = 'intent://chat.whatsapp.com/KkrfMNiwKnN1MHt34gkqH0#Intent;scheme=https;package=com.whatsapp;end';
                        } catch(e) {}
                    }, 1600);

                    // Strategy 4: Show manual buttons
                    setTimeout(function() {
                        showButtons('Автоматты ашылмады — батырманы басыңыз');
                    }, 2500);

                } else if (isIOS()) {
                    // iOS in-app browser strategies

                    // Strategy 1: Try x-safari scheme
                    try {
                        window.location.href = 'x-safari-' + WHATSAPP_LINK;
                    } catch(e) {}

                    // Strategy 2: Try whatsapp:// deep link
                    setTimeout(function() {
                        try {
                            window.location.href = 'whatsapp://chat/?code=KkrfMNiwKnN1MHt34gkqH0';
                        } catch(e) {}
                    }, 800);

                    // Strategy 3: Try to open via window.open with _blank
                    setTimeout(function() {
                        try {
                            window.open(WHATSAPP_LINK, '_blank');
                        } catch(e) {}
                    }, 1500);

                    // Strategy 4: Show manual buttons
                    setTimeout(function() {
                        showButtons('Автоматты ашылмады — батырманы басыңыз');
                    }, 2200);

                } else {
                    // Other in-app browsers
                    window.location.href = WHATSAPP_LINK;
                    setTimeout(function() {
                        showButtons('Батырманы басыңыз');
                    }, 1500);
                }

            } else {
                // === REGULAR BROWSER ===
                statusText.textContent = 'WhatsApp ашылуда...';

                if (isAndroid()) {
                    // Try WhatsApp intent
                    window.location.href = 'intent://chat.whatsapp.com/KkrfMNiwKnN1MHt34gkqH0#Intent;scheme=https;package=com.whatsapp;end';
                    
                    // Fallback to direct link
                    setTimeout(function() {
                        window.location.href = WHATSAPP_LINK;
                    }, 1000);
                } else {
                    // iOS & Desktop — direct redirect
                    window.location.href = WHATSAPP_LINK;
                }

                // Show buttons as fallback
                setTimeout(function() {
                    showButtons('Автоматты ашылмады — батырманы басыңыз');
                }, 3000);
            }
        }

        // ===== SPECIAL: COPY-TO-CLIPBOARD FALLBACK =====
        // Some in-app browsers block ALL redirects. Offer clipboard copy.
        function copyLink() {
            navigator.clipboard.writeText(WHATSAPP_LINK).then(function() {
                alert('Сілтеме көшірілді! Браузерді ашып, сілтемені қойыңыз.');
            }).catch(function() {
                // Fallback for older browsers
                var input = document.createElement('input');
                input.value = WHATSAPP_LINK;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('Сілтеме көшірілді! Браузерді ашып, сілтемені қойыңыз.');
            });
        }

        // ===== START =====
        // Small delay to let the page render, then start redirect
        setTimeout(startRedirect, 400);
    </script>
</body>
</html>
